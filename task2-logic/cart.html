<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="cart.css" />
    <title>CubMart - Cart</title>
  </head>
  <body>
    
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <a class="navbar-brand text-white" href="../task1-design/index.html">
          Cub<span class="logo-text">Mart</span>
        </a>

        <div class="ms-auto">
          <ul class="navbar-nav align-items-center">
            <li class="nav-item">
              <a class="nav-link" href="../task1-design/index.html">Back to home <i class="fa-solid fa-house ms-1"></i></a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <h2 class="mb-4 fw-bold">Shopping Cart</h2>
      
      <div class="row g-4">
        <div class="col-lg-8" id="cart-items-container">
          </div>

        <div class="col-lg-4">
          <div class="summary-card p-4 rounded-3 shadow-sm border">
            <h4 class="fw-bold mb-3">Order Summary</h4>
            <div class="d-flex justify-content-between mb-2">
              <span>Items Subtotal:</span>
              <span id="items-count">$0.00</span>
            </div>
            <div class="d-flex justify-content-between mb-2 text-danger">
              <span>Volume Discount:</span>
              <span id="discount-amount">-$0.00</span>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-bold text-muted">Promo Code (Try: CubMart)</label>
              <div class="input-group input-group-sm">
                <input type="text" id="promo-input" class="form-control" placeholder="Enter code">
                <button class="btn btn-dark" type="button" onclick="applyPromo()">Apply</button>
              </div>
              <div id="promo-message" class="small mt-1 fw-bold"></div>
            </div>
            <div class="d-flex justify-content-between mb-2 text-secondary">
              <span>Estimated Tax (14%):</span>
              <span id="tax-amount">$0.00</span>
            </div>
            <hr>
            <div class="d-flex justify-content-between mb-4 fs-5 fw-bold">
              <span>Total Price:</span>
              <span class="text-success" id="total-price">$0.00</span>
            </div>
            <button class="btn btn-warning w-100 fw-bold py-2" onclick="processCheckoutOrder()">Proceed to Checkout</button>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="cart.js"></script>
  </body>
</html>
